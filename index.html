<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Bouquet</title>

<link rel="stylesheet" href="style.css">
</head>

<body class="dark-theme">

<div class="container">

<header class="header">
    <h1>🌸 Music Bouquet</h1>
    <p>Создай музыкальный подарок</p>
</header>

<!-- 💐 БУКЕТЫ -->
<div class="bouquet-grid">

    <div class="bouquet" data-bouquet="classic1">
        <img src="images/bouquets/classic1.webp">
    </div>

    <div class="bouquet" data-bouquet="classic2">
        <img src="images/bouquets/classic2.webp">
    </div>

    <div class="bouquet" data-bouquet="elegant1">
        <img src="images/bouquets/elegant1.webp">
    </div>

    <div class="bouquet" data-bouquet="elegant2">
        <img src="images/bouquets/elegant2.webp">
    </div>

    <div class="bouquet" data-bouquet="romantic1">
        <img src="images/bouquets/romantic1.webp">
    </div>

    <div class="bouquet" data-bouquet="romantic2">
        <img src="images/bouquets/romantic2.webp">
    </div>

</div>

<!-- 📝 ФОРМА -->
<div class="form">

    <input id="title" placeholder="Название трека">
    <input id="author" placeholder="Автор">
    <textarea id="text" placeholder="Сообщение"></textarea>

    <input id="youtube" placeholder="YouTube ссылка">
    <input id="yandex" placeholder="Яндекс Музыка">

    <input type="file" id="fileInput">

    <button id="createBtn">✨ Создать</button>
    <button id="copyBtn">📋 Скопировать ссылку</button>

    <p id="result"></p>

</div>

</div>

<script src="app.js"></script>

<script>
let selectedBouquet = null;
let lastImage = null;

/* 💐 выбор букета */
document.querySelectorAll(".bouquet").forEach(el => {
    el.addEventListener("click", () => {

        document.querySelectorAll(".bouquet")
            .forEach(b => b.classList.remove("active"));

        el.classList.add("active");

        selectedBouquet = el.dataset.bouquet;

        console.log("Selected bouquet:", selectedBouquet);
    });
});


/* 📁 галерея */
document.getElementById("fileInput").addEventListener("change", (e) => {

    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = (ev) => {
        lastImage = ev.target.result;
        console.log("Loaded image from gallery");
    };

    reader.readAsDataURL(file);
});


/* 🔗 создать ссылку */
document.getElementById("createBtn").onclick = () => {

    const data = {
        title: document.getElementById("title").value,
        author: document.getElementById("author").value,
        text: document.getElementById("text").value,
        youtube: document.getElementById("youtube").value,
        yandex: document.getElementById("yandex").value,

        // 💐 ВАЖНО: приоритет
        image: lastImage ? lastImage : selectedBouquet
    };

    const link = createShareLink(data);

    document.getElementById("result").textContent = link;
    window.generatedLink = link;
};


/* 📋 copy */
document.getElementById("copyBtn").onclick = async () => {
    await navigator.clipboard.writeText(window.generatedLink || "");
    alert("Ссылка скопирована");
};
</script>

</body>
</html>
