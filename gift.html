﻿<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gift</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    width:90%;
    max-width:420px;
    background:rgba(255,255,255,0.08);
    padding:20px;
    border-radius:16px;
    text-align:center;
}

#img{
    width:100%;
    border-radius:12px;
    min-height:200px;
    object-fit:cover;
    background:#111;
    display:none;
}
</style>

</head>

<body>

<div class="card">

    <img id="img">

    <h2>Для тебя 💛</h2>

    <p id="text"></p>
    <h3 id="title"></h3>
    <p id="author"></p>

    <a id="yt" target="_blank">YouTube</a>
    <a id="ym" target="_blank">Music</a>

</div>

<script>

/* 🔐 decode */
function decode(str){
    try{
        const pad = '='.repeat((4 - str.length % 4) % 4);
        return JSON.parse(
            decodeURIComponent(
                atob((str+pad).replace(/-/g,'+').replace(/_/g,'/'))
            )
        );
    }catch(e){
        return null;
    }
}

function load(){

    const data = decode(location.hash.slice(1));

    if(!data){
        document.body.innerHTML = "<h2>Ошибка ссылки</h2>";
        return;
    }

    document.getElementById("text").textContent = data.x || "";
    document.getElementById("title").textContent = data.t || "";
    document.getElementById("author").textContent = data.a || "";

    const img = document.getElementById("img");

    /* 💐 SYSTEM + BASE64 ONLY */
    let src = data.i || "";

    if(src){

        img.onload = () => img.style.display = "block";
        img.onerror = () => img.style.display = "none";

        img.src = src;
    }

    const yt = document.getElementById("yt");
    const ym = document.getElementById("ym");

    if(data.y) yt.href = data.y; else yt.style.display="none";
    if(data.m) ym.href = data.m; else ym.style.display="none";
}

window.onload = load;

</script>

</body>
</html>
