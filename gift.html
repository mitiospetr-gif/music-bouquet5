<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gift</title>

<link rel="stylesheet" href="style.css">
</head>

<body class="gift-page">

<div class="gift-card">

<div class="bouquet-wrapper">
<img id="img">
</div>

<div class="gift-content">

<h2>Для тебя 💛</h2>
<p id="text"></p>
<h3 id="title"></h3>
<p id="author"></p>

<div class="links-section">
<a id="yt" class="btn-platform youtube">YouTube</a>
<a id="ym" class="btn-platform yandex">Яндекс</a>
</div>

</div>

</div>

<script src="app.js"></script>

<script>
function decode(str){
    const pad = '='.repeat((4-str.length%4)%4);
    return JSON.parse(decodeURIComponent(atob((str+pad).replace(/-/g,'+').replace(/_/g,'/'))));
}

const data = decode(location.hash.slice(1));

text.textContent = data.x || "";
title.textContent = data.t || "";
author.textContent = data.a || "";

if(data.i){
    img.src = data.i.startsWith("data:")
    ? data.i
    : "images/bouquets/"+data.i+".webp";
}

if(data.y) yt.href=data.y; else yt.style.display="none";
if(data.m) ym.href=data.m; else ym.style.display="none";
</script>

</body>
</html>
