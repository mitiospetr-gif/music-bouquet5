<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Gift</title>

<link rel="stylesheet" href="style.css">
</head>

<body class="gift-page">

<div class="gift-container">

    <div class="gift-card">

        <!-- 💐 IMAGE -->
        <div class="bouquet-wrapper">
            <img id="img" class="bouquet-image" src="">
        </div>

        <!-- 💛 CONTENT -->
        <div class="gift-content">

            <h2 class="greeting-title">Для тебя 💛</h2>

            <p id="text" class="greeting-text"></p>

            <h3 id="title" class="track-name"></h3>

            <div class="links-section">

                <a id="yt" class="btn-platform youtube" target="_blank">
                    ▶ YouTube
                </a>

                <a id="ym" class="btn-platform yandex" target="_blank">
                    🎵 Яндекс Музыка
                </a>

            </div>

            <p id="author" class="author-text"></p>

        </div>

    </div>

</div>

<!-- JS ENGINE -->
<script src="app.js"></script>

</body>
</html>
